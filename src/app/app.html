<!-- Root wrapper: full viewport, no overflow -->
<div class="flex flex-col bg-[#0B0F1A] text-slate-100 antialiased" style="height:100vh; width:100vw; overflow:hidden;">

  <!-- ═══ NAVBAR ═══ -->
  <header class="shrink-0 h-14 flex items-center justify-between px-4 border-b border-white/10 bg-slate-900/80 backdrop-blur-md z-30">
    
    <!-- Left: Hamburger + Logo -->
    <div class="flex items-center gap-3">

      <!-- Hamburger toggle -->
      <button (click)="toggleSidebar()"
        class="w-9 h-9 flex flex-col justify-center items-center gap-[5px] rounded-lg hover:bg-white/10 active:bg-white/20 transition-colors shrink-0 cursor-pointer"
        title="Toggle Sidebar">
        <span class="block h-0.5 bg-slate-300 rounded-full transition-all duration-300"
          [style.width]="'20px'"
          [style.transform]="!sidebarOpen() ? 'rotate(45deg) translate(5px,5px)' : 'none'"></span>
        <span class="block h-0.5 bg-slate-300 rounded-full transition-all duration-300"
          [style.width]="'20px'"
          [style.opacity]="!sidebarOpen() ? '0' : '1'"></span>
        <span class="block h-0.5 bg-slate-300 rounded-full transition-all duration-300"
          [style.width]="'20px'"
          [style.transform]="!sidebarOpen() ? 'rotate(-45deg) translate(5px,-5px)' : 'none'"></span>
      </button>

      <!-- Logo -->
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-blue-500 flex items-center justify-center shadow-lg shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <div class="hidden sm:block">
          <p class="text-sm font-bold text-white leading-none">{{ 'NAVBAR.TITLE' | translate }}</p>
          <p class="text-xs text-slate-400 leading-none mt-0.5">Ismailia District 2</p>
        </div>
      </div>
    </div>

    <!-- Right: Lang + Senior Toggle + Avatar -->
    <div class="flex items-center gap-2">

      <!-- Language Switcher — uses switchLang() which properly updates the signal+effect -->
      <div class="flex bg-slate-800 rounded-lg p-0.5 border border-white/10 gap-0.5">
        <button (click)="switchLang('en')"
          class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all duration-200 select-none"
          [class.bg-emerald-500]="isLang('en')"
          [class.text-white]="isLang('en')"
          [class.shadow-md]="isLang('en')"
          [class.text-slate-400]="!isLang('en')"
          [class.hover:text-white]="!isLang('en')">
          EN
        </button>
        <button (click)="switchLang('ar')"
          class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all duration-200 select-none"
          [class.bg-emerald-500]="isLang('ar')"
          [class.text-white]="isLang('ar')"
          [class.shadow-md]="isLang('ar')"
          [class.text-slate-400]="!isLang('ar')"
          [class.hover:text-white]="!isLang('ar')">
          عربي
        </button>
      </div>

      <!-- Senior Toggle -->
      <app-senior-toggle></app-senior-toggle>

      <!-- Theme Toggle -->
      <button (click)="toggleTheme()"
        class="w-9 h-9 rounded-lg bg-slate-800 border border-white/10 flex items-center justify-center hover:bg-slate-700 transition-all hover:scale-105"
        [title]="isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <span class="text-lg transition-all duration-300" [class.rotate-180]="!isDark()">
          {{ isDark() ? '🌙' : '☀️' }}
        </span>
      </button>

      <!-- Avatar -->
      <div class="w-8 h-8 rounded-full bg-slate-700 border border-white/10 flex items-center justify-center shrink-0 ml-1">
        <span class="text-sm">👤</span>
      </div>
    </div>
  </header>

  <!-- ═══ BODY ═══ -->
  <div class="flex flex-1 min-h-0 overflow-hidden">

    <!-- ═══ SIDEBAR ═══ -->
    <aside
      class="shrink-0 flex flex-col bg-slate-900/70 backdrop-blur-md border-r border-white/10 z-20 overflow-hidden transition-[width] duration-300 ease-in-out"
      [style.width]="sidebarOpen() ? '200px' : '60px'">

      <!-- Nav Links -->
      <nav class="flex-1 px-2 py-5 space-y-1">

        <!-- Home -->
        <a routerLink="/home" routerLinkActive="bg-emerald-500/15 text-emerald-400 !border-emerald-500/40"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200"
           [class.justify-center]="!sidebarOpen()"
           [title]="!sidebarOpen() ? ('SIDEBAR.HOME' | translate) : ''">
          <span class="text-xl shrink-0 leading-none">🏠</span>
          <!-- Text: visible only when open -->
          <span *ngIf="sidebarOpen()" class="text-sm font-medium whitespace-nowrap overflow-hidden">
            {{ 'SIDEBAR.HOME' | translate }}
          </span>
        </a>

        <!-- Map -->
        <a routerLink="/map" routerLinkActive="bg-emerald-500/15 text-emerald-400 !border-emerald-500/40"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200"
           [class.justify-center]="!sidebarOpen()"
           [title]="!sidebarOpen() ? ('SIDEBAR.MAP' | translate) : ''">
          <span class="text-xl shrink-0 leading-none">🗺️</span>
          <span *ngIf="sidebarOpen()" class="text-sm font-medium whitespace-nowrap overflow-hidden">
            {{ 'SIDEBAR.MAP' | translate }}
          </span>
        </a>

        <!-- Dashboard -->
        <a routerLink="/dashboard" routerLinkActive="bg-emerald-500/15 text-emerald-400 !border-emerald-500/40"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-transparent text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200"
           [class.justify-center]="!sidebarOpen()"
           [title]="!sidebarOpen() ? ('SIDEBAR.DASHBOARD' | translate) : ''">
          <span class="text-xl shrink-0 leading-none">📊</span>
          <span *ngIf="sidebarOpen()" class="text-sm font-medium whitespace-nowrap overflow-hidden">
            {{ 'SIDEBAR.DASHBOARD' | translate }}
          </span>
        </a>
      </nav>

      <!-- Version -->
      <div class="px-2 py-3 border-t border-white/5">
        <p *ngIf="sidebarOpen()" class="text-xs text-slate-600 text-center whitespace-nowrap">
          {{ 'SIDEBAR.VERSION' | translate }}
        </p>
      </div>
    </aside>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="flex-1 min-w-0 overflow-y-auto overflow-x-hidden custom-scrollbar" style="padding: 20px 24px;">
      <div class="w-full">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
