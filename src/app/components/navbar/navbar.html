<nav class="h-16 border-b border-white/10 glass-panel !rounded-none flex items-center justify-between px-6 shrink-0 relative z-20">
  <div class="flex items-center gap-4">
    <!-- Logo -->
    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-emerald-400 to-blue-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </div>
    
    <div>
      <h1 class="font-bold text-xl tracking-tight text-white">{{ 'NAVBAR.TITLE' | translate }}</h1>
      <p class="text-xs text-slate-400">Ismailia District 2</p>
    </div>
  </div>

  <div class="flex items-center gap-4">
    
    <!-- Language Switcher -->
    <div class="flex bg-slate-800/50 rounded-lg p-1 border border-white/5">
      <button (click)="switchLang('en')" [class.bg-white_10]="translate.currentLang === 'en'" [class.text-white]="translate.currentLang === 'en'" class="px-3 py-1 rounded text-sm font-medium text-slate-400 hover:text-white transition-colors">
        EN
      </button>
      <button (click)="switchLang('ar')" [class.bg-white_10]="translate.currentLang === 'ar'" [class.text-white]="translate.currentLang === 'ar'" class="px-3 py-1 rounded text-sm font-medium text-slate-400 hover:text-white transition-colors font-arabic">
        عربي
      </button>
    </div>

    <!-- Senior Mode Toggle -->
    <app-senior-toggle></app-senior-toggle>
    
    <div class="w-px h-8 bg-white/10 mx-2"></div>
    
    <button class="w-10 h-10 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center hover:bg-slate-700 transition-colors">
      <span class="text-lg">👤</span>
    </button>
  </div>
</nav>
